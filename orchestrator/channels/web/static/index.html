<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>LUNA Command Center</title>
  <link rel="stylesheet" href="/static/style.css?v=47">
  <!-- Theme flash-frei anwenden, bevor der Body rendert (Dunkel/Hell/Auto aus localStorage). -->
  <script>(function () {
    var m = localStorage.getItem("luna-theme") || "auto";
    var light = m === "light" || (m === "auto" && window.matchMedia("(prefers-color-scheme: light)").matches);
    document.documentElement.classList.add(light ? "theme-light" : "theme-dark");
  })();</script>
  <script src="/static/vendor/winbox.bundle.min.js"></script>
</head>
<body>
  <div id="starfield"></div>
  <div id="grid"></div>
  <div id="scan"></div>

  <div id="cc">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="brand-block">
        <div class="brand-mark"><span></span></div>
        <div><div class="brand">LUNA</div><div class="brand-sub">COMMAND CENTER</div></div>
        <button id="side-toggle" title="Menü">☰</button>
      </div>
      <nav id="nav"></nav>
      <div class="theme-switch" id="theme-switch" title="Erscheinungsbild">
        <button data-theme-set="dark">Dunkel</button>
        <button data-theme-set="light">Hell</button>
        <button data-theme-set="auto">Auto</button>
      </div>
      <div class="side-voice">
        <button id="focus-btn" class="focus-btn">⚡ Fokus-Modus</button>
      </div>
    </aside>

    <!-- Body -->
    <div id="cc-body">
      <header id="topbar">
        <button id="nav-open" title="Menü">☰</button>
        <div class="sysstatus"><span class="dot"></span>SYSTEM&nbsp;<b>OPTIMAL</b></div>
        <div class="clockblock"><div id="datum"></div><div id="clock"></div></div>
        <div class="topactions">
          <input id="topsearch" placeholder="Suche · frag LUNA …" autocomplete="off">
          <button id="edit-dash" title="Dashboard anpassen (Widgets anordnen/aus­blenden)">✎</button>
          <span id="live" class="live"><span class="dot"></span>LIVE</span>
        </div>
      </header>

      <main id="cc-main"><!-- Panels werden von app.js gerendert --></main>
    </div>
  </div>

  <script src="/static/app.js?v=47"></script>
</body>
</html>
