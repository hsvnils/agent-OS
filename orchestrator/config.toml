# Orchestrator-Konfiguration (modell-agnostisch; Werte sind Richtwerte/ueberschreibbar).
# Diese Datei enthaelt KEINE Secrets. Secrets stehen in orchestrator/.env.

[run]
# dry_run = true  -> Mock-Backend, keine echten Modellaufrufe, keine Kosten (Self-Checks).
# dry_run = false -> echtes Agent-SDK-Backend (benoetigt ANTHROPIC_API_KEY, GATE B).
dry_run = true
channel = "terminal"   # terminal | mock
max_turns = 4          # Turn-Spielraum je Subagent-Aufruf (Live-Backend); zu knapp -> "max turns"-Fehler

[models]
# Defaults aus den Charten; per Config ueberschreibbar.
hoa = "claude-opus-4-8"
cto = "claude-opus-4-8"
berater = "claude-opus-4-8"
routing = "claude-haiku-4-5"   # guenstiges Modell fuer internes Routing (optional)

[effort]
hoa = "high"
cto = "high"
berater = "high"

[observability]
log_to_file = true
log_dir = "orchestrator/logs"
agentops_enabled = false        # externer Dienst = CEO-Tor; Standard aus

[governance]
budget_file = "finance/budget.md"
policy_file = "governance/zugriffs-policy.md"
changelog_file = "projekt_changelog.md"

[memory]
# Dateibasiertes Agenten-Gedaechtnis (append-only JSONL). Kein externer Dienst.
enabled = true
path = "orchestrator/memory/log.jsonl"          # kanonischer, versionierter Store
recall_limit = 5                                 # letzte N Eintraege als Kontext (+ Stichwort-Treffer)

[voice]
# Live-Voice-Kanal (Browser, WebRTC lokal). STT/TTS sind kostenpflichtig (CEO-Tor).
# Provider per einer Zeile austauschbar; Keys ausschliesslich in orchestrator/.env.
host = "localhost"
port = 7860
language = "de"
stt_provider = "deepgram"        # Default; Key: DEEPGRAM_API_KEY
tts_provider = "elevenlabs"      # CEO-Wahl am GATE (2026-06-24): beste deutsche Stimmqualitaet
tts_voice_id = ""                # leer = ElevenLabs-Default-Stimme; optional eigene Voice-ID
llm_model = "claude-haiku-4-5"   # schnelles Modell fuer den HoA-Sprechpfad; Delegation nutzt Opus
